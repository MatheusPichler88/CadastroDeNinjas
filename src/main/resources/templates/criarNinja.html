<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Novo Ninja</title>

    <style>

        body{
        font-family:'Segoe UI';
        background:#0f172a;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        }

        .container{
        background:#1e293b;
        padding:30px;
        border-radius:16px;
        width:400px;
        box-shadow:0 20px 40px rgba(0,0,0,0.4);
        }

        h1{
        text-align:center;
        margin-bottom:20px;
        color:#f97316;
        }

        input, select{
        width:100%;
        padding:10px;
        margin-bottom:12px;
        border-radius:6px;
        border:none;
        }

        button{
        width:100%;
        padding:10px;
        background:#16a34a;
        border:none;
        border-radius:8px;
        color:white;
        font-weight:bold;
        cursor:pointer;
        }

        button:hover{
        background:#22c55e;
        }

        .voltar{
        display:block;
        text-align:center;
        margin-top:10px;
        color:#94a3b8;
        text-decoration:none;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
        }

        input[type=number] {
        -moz-appearance: textfield;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Novo Ninja</h1>

    <form th:action="@{/ninjas/ui/salvar}" th:object="${ninja}" method="post">

        <input type="text" th:field="*{nome}" placeholder="Nome" required>

        <input type="number" th:field="*{idade}" placeholder="Idade" min="1" max="120">

        <input type="email" th:field="*{email}" placeholder="Email" required>

        <input type="text" th:field="*{rank}" placeholder="Rank" required>

        <input type="text" th:field="*{imgUrl}" placeholder="URL da imagem">


        <button type="submit">Salvar Ninja</button>

    </form>

    <a class="voltar" th:href="@{/ninjas/ui/listar}">Voltar</a>

</div>

</body>
</html>
