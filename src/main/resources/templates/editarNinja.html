<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Ninja</title>

    <style>

        body{
        font-family:'Segoe UI';
        background:#0f172a;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        }

        form{
        background:#1e293b;
        padding:2rem;
        border-radius:16px;
        width:350px;
        }

        h1{
        text-align:center;
        margin-bottom:1rem;
        color:#f97316;
        }

        input{
        width:100%;
        padding:0.6rem;
        margin-bottom:0.8rem;
        border-radius:6px;
        border:none;
        }

        button{
        width:100%;
        padding:0.6rem;
        background:#d97706;
        border:none;
        border-radius:8px;
        color:white;
        font-weight:bold;
        cursor:pointer;
        }

        button:hover{
        background:#f59e0b;
        }

    </style>

</head>

<body>

<form th:action="@{/ninjas/ui/atualizar/{id}(id=${ninja.id})}"
      th:object="${ninja}"
      method="post">

    <h1>Editar Ninja</h1>

    <input type="text" th:field="*{nome}">

    <input type="number" th:field="*{idade}">

    <input type="email" th:field="*{email}">

    <input type="text" th:field="*{rank}">

    <input type="text" th:field="*{imgUrl}">

    <button type="submit">Atualizar</button>

</form>

</body>
</html>
