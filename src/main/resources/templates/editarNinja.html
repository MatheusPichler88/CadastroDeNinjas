<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Ninja</title>

    <style>

        body{
        font-family:'Segoe UI';
        background:#0f172a;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        }

        form{
        background:#1e293b;
        padding:2rem;
        border-radius:16px;
        width:350px;
        }

        h1{
        text-align:center;
        margin-bottom:1rem;
        color:#f97316;
        }

        input, select{
        width:100%;
        padding:0.6rem;
        margin-bottom:0.8rem;
        border-radius:6px;
        border:none;
        background: #f8fafc;
        }

        button{
        width:100%;
        padding:0.6rem;
        background:#d97706;
        border:none;
        border-radius:8px;
        color:white;
        font-weight:bold;
        cursor:pointer;
        margin-top: 10px;
        }

        button:hover{
        background:#f59e0b;
        }

        label {
        font-size: 0.8rem;
        color: #94a3b8;
        display: block;
        margin-bottom: 2px;
        }

    </style>

</head>

<body>

<form th:action="@{/ninjas/ui/atualizar/{id}(id=${ninja.id})}"
      th:object="${ninja}"
      method="post">

    <h1>Editar Ninja</h1>

    <input type="text" th:field="*{nome}" placeholder="Nome">

    <input type="number" th:field="*{idade}" placeholder="Idade">

    <input type="email" th:field="*{email}" placeholder="Email">

    <input type="text" th:field="*{rank}" placeholder="Rank">

    <input type="text" th:field="*{imgUrl}" placeholder="URL da imagem">

    <label>Missão Atual</label>
    <select th:field="*{missoes}">
        <option value="" selected>Sem missão</option>
        <option th:each="missao : ${missoes}"
                th:value="${missao.id}"
                th:text="${missao.nome}">
        </option>
    </select>

    <button type="submit">Atualizar</button>

</form>

</body>
</html>
