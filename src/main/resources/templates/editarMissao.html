<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Nova Missão</title>

    <style>

        body{
        font-family:'Segoe UI';
        background:#0f172a;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        }

        .container{
        background:#1e293b;
        padding:30px;
        border-radius:16px;
        width:400px;
        box-shadow:0 20px 40px rgba(0,0,0,0.4);
        }

        h1{
        text-align:center;
        margin-bottom:20px;
        color:#f97316;
        }

        input{
        width:100%;
        padding:10px;
        margin-bottom:12px;
        border-radius:6px;
        border:none;
        }

        button{
        width:100%;
        padding:10px;
        background:#16a34a;
        border:none;
        border-radius:8px;
        color:white;
        font-weight:bold;
        cursor:pointer;
        }

        button:hover{
        background:#22c55e;
        }

        .voltar{
        display:block;
        text-align:center;
        margin-top:10px;
        color:#94a3b8;
        text-decoration:none;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Criar Missão</h1>

    <form th:action="@{/missoes/ui/salvar}" th:object="${missao}" method="post">

        <input type="hidden" th:field="*{id}">

        <input type="text"
               th:field="*{nome}"
               placeholder="Nome da missão">

        <input type="text"
               th:field="*{dificuldade}"
               placeholder="Dificuldade">

        <button type="submit">Salvar</button>

    </form>

    <a class="voltar" th:href="@{/missoes/ui/listar}">
        Voltar
    </a>

</div>

</body>
</html>
