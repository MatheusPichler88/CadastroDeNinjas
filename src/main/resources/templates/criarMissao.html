<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova Missão</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #f97316;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #94a3b8;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        select option {
            background: #1e293b;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #16a34a;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #22c55e;
            transform: translateY(-2px);
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
        }

        .voltar:hover {
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Nova Missão</h1>

    <form th:action="@{/missoes/ui/salvar}" th:object="${missao}" method="post">

        <label>Nome da Missão</label>
        <input type="text" th:field="*{nome}" placeholder="Ex: Proteger a Ponte" required>

        <label>Dificuldade</label>
        <input type="text" th:field="*{dificuldade}" placeholder="Ex: Rank S" required>

        <label>Atribuir a um Ninja</label>
        <select th:field="*{ninjaId}" required>
            <option value="" disabled selected>Escolha o ninja responsável</option>
            <option th:each="ninja : ${ninjas}"
                    th:value="${ninja.id}"
                    th:text="${ninja.nome}">
            </option>
        </select>

        <button type="submit">Cadastrar Missão</button>
    </form>

    <a class="voltar" th:href="@{/missoes/ui/listar}">← Voltar para a lista</a>
</div>

</body>
</html>
