<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Missões</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary: #2563eb;
            --secondary: #f97316;
            --accent: #16a34a;
            --danger: #dc2626;
            --warning: #d97706;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-actions {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .botao-voltar {
            padding: 10px 18px;
            background: #334155;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.2s;
        }

        .botao-voltar:hover {
            background: #475569;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            color: var(--secondary);
            font-size: 2rem;
            letter-spacing: -1px;
        }

        .nova {
            display: inline-block;
            margin-bottom: 20px;
            background: var(--accent);
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .nova:hover {
            background: #15803d;
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            padding: 15px;
            border-bottom: 2px solid var(--border);
            text-align: left;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        /* Estilização das Ações */
        .actions-cell {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            transition: 0.2s;
        }

        .detalhes { background: var(--primary); color: white; }
        .editar { background: var(--warning); color: white; }
        .deletar { background: var(--danger); color: white; }

        .btn-action:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        /* Badge simples para dificuldade */
        .badge {
            background: var(--border);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

    </style>
</head>
<body>

<div class="header-actions">
    <a class="botao-voltar" th:href="@{/ninjas/ui/listar}">
        ← Voltar para Ninjas
    </a>
</div>

<div class="container">
    <h1>Lista de Missões</h1>

    <a class="nova" th:href="@{/missoes/ui/novo}">+ Nova Missão</a>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nome da Missão</th>
            <th>Dificuldade</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="missao : ${missoes}">
            <td th:text="${missao.id}" style="font-family: monospace; color: var(--text-muted);"></td>
            <td th:text="${missao.nome}" style="font-weight: 500;"></td>
            <td>
                <span class="badge" th:text="${missao.dificuldade}"></span>
            </td>
            <td>
                <div class="actions-cell">
                    <a class="btn-action detalhes" th:href="@{/missoes/ui/detalhes/{id}(id=${missao.id})}">Detalhes</a>
                    <a class="btn-action editar" th:href="@{/missoes/ui/editar/{id}(id=${missao.id})}">Editar</a>
                    <a class="btn-action deletar" th:href="@{/missoes/ui/deletar/{id}(id=${missao.id})}">Excluir</a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
