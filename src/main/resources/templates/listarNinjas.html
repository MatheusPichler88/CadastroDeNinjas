<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tabela de Ninjas</title>

    <style>

        /* ===== Reset ===== */

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        }

        /* ===== Body ===== */

        body{
        font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
        background:#0f172a;
        color:#e2e8f0;
        min-height:100vh;
        padding:2rem;
        display:flex;
        flex-direction:column;
        align-items:center;
        }

        /* ===== Navbar ===== */

        .navbar{
        width:100%;
        max-width:1800px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:30px;
        }

        .nav-links{
        display:flex;
        gap:12px;
        }

        .nav-btn{
        padding:8px 18px;
        border-radius:8px;
        text-decoration:none;
        font-weight:600;
        font-size:0.9rem;
        background:#1e293b;
        color:#e2e8f0;
        transition:all 0.2s ease;
        border:1px solid #334155;
        }

        .nav-btn:hover{
        background:#2563eb;
        color:white;
        transform:translateY(-1px);
        box-shadow:0 4px 10px rgba(37,99,235,0.4);
        }

        /* ===== Botão Novo Ninja ===== */

        .novo-ninja{
        display:inline-block;
        padding:10px 18px;
        background:#16a34a;
        color:white;
        font-weight:600;
        border-radius:8px;
        text-decoration:none;
        }

        .novo-ninja:hover{
        background:#22c55e;
        }

        /* ===== Título ===== */

        h1{
        text-align:center;
        font-size:2.5rem;
        font-weight:700;
        margin-bottom:2rem;
        background:linear-gradient(135deg,#f97316,#ef4444);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        letter-spacing:-0.5px;
        }

        /* ===== Tabela ===== */

        table{
        width:100%;
        max-width:1800px;
        margin:0 auto;
        border-collapse:separate;
        border-spacing:0;
        background:#1e293b;
        border-radius:16px;
        overflow:hidden;
        box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);
        }

        thead{
        background:linear-gradient(135deg,#1e293b,#334155);
        }

        thead th{
        position:sticky;
        top:0;
        z-index:1;
        }

        th{
        padding:1.2rem 1.8rem;
        text-align:left;
        font-size:0.75rem;
        font-weight:600;
        text-transform:uppercase;
        letter-spacing:1px;
        color:#94a3b8;
        border-bottom:2px solid #334155;
        }

        td{
        padding:1.2rem 1.8rem;
        font-size:0.95rem;
        border-bottom:1px solid #262f3d;
        vertical-align:middle;
        }

        tbody tr{
        transition:background 0.2s ease;
        }

        tbody tr:hover{
        background:#334155;
        transform:scale(1.01);
        transition:all 0.15s ease;
        }

        tbody tr:last-child td{
        border-bottom:none;
        }

        /* ===== Imagem ===== */

        td img{
        width:70px;
        height:70px;
        border-radius:50%;
        object-fit:cover;
        border:2px solid #f97316;
        box-shadow:0 0 12px rgba(249,115,22,0.3);
        }

        /* ===== Badge Rank ===== */

        .badge{
        padding:4px 10px;
        border-radius:20px;
        background:#2563eb;
        font-size:0.75rem;
        font-weight:600;
        }

        /* ===== Botões de ação ===== */

        td a{
        display:inline-block;
        padding:0.45rem 1rem;
        border-radius:8px;
        font-size:0.8rem;
        font-weight:600;
        text-decoration:none;
        transition:all 0.2s ease;
        margin-right:0.4rem;
        }

        /* Ver detalhes */

        td a:nth-child(1){
        background:#1e40af;
        color:#dbeafe;
        }

        td a:nth-child(1):hover{
        background:#2563eb;
        box-shadow:0 4px 15px rgba(37,99,235,0.4);
        transform:translateY(-1px);
        }

        /* Alterar */

        td a:nth-child(2){
        background:#b45309;
        color:#fef3c7;
        }

        td a:nth-child(2):hover{
        background:#d97706;
        box-shadow:0 4px 15px rgba(217,119,6,0.4);
        transform:translateY(-1px);
        }

        /* Deletar */

        td a:nth-child(3){
        background:#991b1b;
        color:#fecaca;
        }

        td a:nth-child(3):hover{
        background:#dc2626;
        box-shadow:0 4px 15px rgba(220,38,38,0.4);
        transform:translateY(-1px);
        }

        td:last-child{
        white-space:nowrap;
        }

        /* ===== Responsivo ===== */

        @media (max-width:768px){

        body{padding:1rem;}

        h1{font-size:1.8rem;}

        th,td{
        padding:0.7rem 0.6rem;
        font-size:0.8rem;
        }

        td a{
        padding:0.35rem 0.7rem;
        font-size:0.7rem;
        margin-bottom:0.3rem;
        }

        }

    </style>

</head>

<body>

<h1>Lista de Ninjas</h1>

<div class="navbar">

    <div class="nav-links">
        <a class="nav-btn" th:href="@{/ninjas/ui/listar}">🥷 Ninjas</a>
        <a class="nav-btn" th:href="@{/missoes/ui/listar}">📜 Missões</a>
    </div>

    <a class="novo-ninja" th:href="@{/ninjas/ui/novo}">+ Novo Ninja</a>

</div>

<table>

    <thead>

    <tr>
        <th>Imagem</th>
        <th>ID</th>
        <th>Nome</th>
        <th>Idade</th>
        <th>Email</th>
        <th>Rank</th>
        <th>Missão</th>
        <th>Dificuldade</th>
        <th>Ações</th>
    </tr>

    </thead>

    <tbody>

    <tr th:each="ninja : ${ninjas}">

        <td>
            <img th:src="${ninja.imgUrl}">
        </td>

        <td th:text="${ninja.id}"></td>

        <td th:text="${ninja.nome}"></td>

        <td th:text="${ninja.idade}"></td>

        <td th:text="${ninja.email}"></td>

        <td>
            <span class="badge" th:text="${ninja.rank}"></span>
        </td>

        <td th:text="${ninja.missoes != null ? ninja.missoes.nome : 'Sem missão'}"></td>

        <td th:text="${ninja.missoes != null ? ninja.missoes.dificuldade : '-'}"></td>

        <td>

            <a th:href="@{/ninjas/ui/detalhes/{id}(id=${ninja.id})}">Ver</a>

            <a th:href="@{/ninjas/ui/editar/{id}(id=${ninja.id})}">Editar</a>

            <a th:href="@{/ninjas/ui/deletar/{id}(id=${ninja.id})}">Deletar</a>

        </td>

    </tr>

    </tbody>

</table>

</body>
</html>
